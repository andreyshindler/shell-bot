services:
  shell-bot:
    build:
      context: .
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    container_name: shell-bot
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ALLOWED_USER_ID: ${ALLOWED_USER_ID}
    volumes:
      - /home/komodo/projects:/home/botuser
      - /home/komodo/projects/shell-bot:/app
