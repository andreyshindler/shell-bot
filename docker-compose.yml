services:
  shell-bot:
    build:
      context: .
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    container_name: shell-bot
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ALLOWED_USER_ID: ${ALLOWED_USER_ID}
      REPO_DIR: /app
      ENV_MINIAPP_URL: https://srv1515969.hstgr.cloud/env
    volumes:
      - /home/komodo/projects:/home/botuser
      - /home/komodo/projects/shell-bot:/app

  env-manager:
    build:
      context: ./env-manager
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    container_name: env-manager
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ALLOWED_USER_ID: ${ALLOWED_USER_ID}
      PROJECTS_ROOT: /projects
    volumes:
      - /home/komodo/projects:/projects
    ports:
      # Loopback only — the host's existing nginx (shared with other
      # projects, see README) reverse-proxies srv1515969.hstgr.cloud/env
      # here. Ports 80/443 are already held by that nginx, so this
      # container can't (and shouldn't) terminate TLS itself.
      - "127.0.0.1:8091:8080"
    healthcheck:
      # Uses the image's Python (no curl needed); urlopen exits non-zero on a
      # non-200, marking the container unhealthy. /env/health is unauthenticated
      # and returns no secrets.
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/env/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
